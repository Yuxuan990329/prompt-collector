<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Collector Workspace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="pc-workspace-body">
    <div class="pc-workspace">
      <header class="pc-workspace-header">
        <div class="pc-workspace-header-main">
          <button id="workspace-back" class="pc-workspace-back" type="button">&larr; Back</button>
          <div>
          <p class="pc-workspace-eyebrow">Prompt Vault</p>
          <h1>Prompt Collector Workspace</h1>
          <p class="pc-workspace-copy">Search, filter, and compare prompt versions side by side.</p>
          </div>
        </div>
      </header>

      <main class="pc-workspace-layout">
        <aside class="pc-workspace-sidebar">
          <div class="pc-workspace-tools">
            <input
              id="workspace-search"
              class="pc-workspace-search"
              type="text"
              placeholder="Search prompts..."
            />
            <select id="workspace-category-filter" class="pc-workspace-filter"></select>
          </div>
          <div id="workspace-list" class="pc-workspace-list"></div>
        </aside>

        <section id="workspace-compare-a" class="pc-workspace-panel"></section>
        <section id="workspace-compare-b" class="pc-workspace-panel"></section>
      </main>
    </div>

    <script src="workspace.js"></script>
  </body>
</html>
